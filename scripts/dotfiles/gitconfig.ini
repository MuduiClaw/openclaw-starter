# OpenClaw Starter — .gitconfig additions
# Applied by setup.sh (non-destructive, only adds if missing)

[core]
  autocrlf = input
  editor = nano

[init]
  defaultBranch = main

[pull]
  rebase = true

[push]
  default = current
  autoSetupRemote = true

[alias]
  co = checkout
  br = branch
  ci = commit
  st = status
  lg = log --oneline --graph --decorate -20
  last = log -1 HEAD --stat
  undo = reset HEAD~1 --mixed
  amend = commit --amend --no-edit

[diff]
  colorMoved = default

[merge]
  conflictstyle = diff3
