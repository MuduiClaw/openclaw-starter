name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: brew install bats-core

      - name: Run bats tests
        run: bats tests/

      - name: Shellcheck scripts
        run: |
          shellcheck --severity=warning \
            scripts/*.sh setup.sh sync-to-template.sh \
            workspace/scripts/*.sh .githooks/*.sh
