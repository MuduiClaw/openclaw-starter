name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for real secrets
        run: |
          echo "🔍 Scanning for leaked secrets..."
          FOUND=0
          
          # Scan targets: workspace/, config/, services/, setup.sh
          SCAN_DIRS="./workspace/ ./config/ ./services/ ./setup.sh"
          
          # Real API keys (Anthropic, GitHub PAT, Slack, AWS)
          if grep -rE '(sk-ant-api[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|xoxb-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16})' \
            --exclude-dir=node_modules --exclude-dir=.git \
            $SCAN_DIRS 2>/dev/null; then
            echo "❌ Real API keys found!"
            FOUND=1
          fi
          
          # Private usernames/paths
          if grep -rn 'wangshufu\|hxrmudui' \
            --exclude-dir=node_modules --exclude-dir=.git \
            $SCAN_DIRS 2>/dev/null; then
            echo "❌ Private references found!"
            FOUND=1
          fi
          
          # Private project names
          if grep -rn 'xueda-dashboard\|aihub-docs\|skiticket' \
            --exclude-dir=node_modules --exclude-dir=.git \
            $SCAN_DIRS 2>/dev/null; then
            echo "❌ Private project references found!"
            FOUND=1
          fi
          
          if [ $FOUND -eq 0 ]; then
            echo "✅ No secrets or private references found"
          else
            exit 1
          fi
